<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voter Roll PDF to Excel</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="title-row">
          <div>
            <h1>Voter Roll PDF to Excel</h1>
            <p>Choose the file type, drop the file, and download a formatted Excel file.</p>
          </div>
          <div class="top-actions">
            <a class="text-link" href="./family.html">Group families</a>
            <a class="text-link" href="./merge.html">Merge voter rolls</a>
            <div class="status-pill" id="readyStatus">Ready</div>
          </div>
        </div>

        <div class="mode-grid" aria-label="Converter type">
          <button class="mode-card selected" type="button" data-mode="scanned">
            <span>Scanned voter roll</span>
            <small>Image PDFs. Uses OCR and page range. Best for English scanned rolls.</small>
          </button>
          <button class="mode-card" type="button" data-mode="tabular">
            <span>Telugu tabular roll</span>
            <small>Text-layer Telugu PDFs. Faster direct table extraction, no OCR.</small>
          </button>
          <button class="mode-card" type="button" data-mode="telugu-columns">
            <span>AI Telugu columns</span>
            <small>Excel files. Type column names and add Telugu columns using the backend.</small>
          </button>
        </div>

        <label class="drop-zone" id="dropZone">
          <input id="fileInput" type="file" accept="application/pdf,.pdf" />
          <span class="drop-icon" id="dropIcon">PDF</span>
          <strong id="dropTitle">Drag PDF here</strong>
          <small>or click to choose a file</small>
        </label>

        <div class="form-grid">
          <label class="columns-field">
            <span>Columns to Convert</span>
            <input id="columnsToConvert" value="Name,RelationshipType,RelationshipName" />
          </label>
          <label>
            <span>Start Page</span>
            <input id="startPage" type="number" min="1" value="3" />
          </label>
          <label>
            <span>End Page</span>
            <input id="endPage" type="number" min="1" value="29" />
          </label>
          <label class="check-field">
            <input id="aiRepair" type="checkbox" />
            <span>AI repair weak rows</span>
          </label>
          <label class="wide-field">
            <span>Backend API URL</span>
            <input
              id="backendUrl"
              value="https://voter-roll-backend-production.up.railway.app"
              placeholder="https://your-railway-app.up.railway.app"
            />
          </label>
        </div>

        <div class="actions">
          <button id="convertBtn" type="button" disabled>Generate Excel</button>
          <button id="clearBtn" type="button" class="secondary">Clear Logs</button>
          <a id="downloadLink" class="download-link" hidden>Download Excel</a>
        </div>

        <div class="progress-wrap" aria-label="Progress">
          <div id="progressBar"></div>
        </div>
      </section>

      <section class="panel log-panel">
        <div class="log-heading">
          <h2>Logs</h2>
          <span id="summary">No file selected</span>
        </div>
        <pre id="logs" aria-live="polite"></pre>
      </section>
    </main>

    <canvas id="pageCanvas" hidden></canvas>
    <script src="./app.js?v=20260610-ai-cell-repair" type="module"></script>
  </body>
</html>
